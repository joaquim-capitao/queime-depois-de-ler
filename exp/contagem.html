<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contagem Regressiva</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#003366,#006699);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.caixa{
    background:rgba(255,255,255,.12);
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(8px);
    box-shadow:0 0 25px rgba(0,0,0,.4);
    max-width:700px;
}

h1{
    margin-top:0;
    font-size:34px;
}

h2{
    font-weight:normal;
    margin-bottom:30px;
}

#contador{
    font-size:44px;
    font-weight:bold;
    line-height:1.6;
    font-family: "Courier New", monospace;
}
</style>

</head>

<body>

<div class="caixa">

<h1>Congresso Internacional 2026</h1>
<h2>"Felicidade Eterna"</h2>

<div id="contador"></div>

</div>

<script>

const dataEvento = new Date("2026-07-10T10:20:00");

function atualizar(){

    const agora = new Date();
    const diferenca = dataEvento - agora;

    if(diferenca <= 0){
        document.getElementById("contador").innerHTML =
        "🎉 O congresso começou!";
        return;
    }

    const dias = Math.floor(diferenca / (1000*60*60*24));
    const horas = Math.floor((diferenca / (1000*60*60)) % 24);
    const minutos = Math.floor((diferenca / (1000*60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);
    const milissegundos = Math.floor(diferenca % 1000);

    document.getElementById("contador").innerHTML =
        dias + " dias<br>" +
        horas + " horas<br>" +
        minutos + " minutos<br>" +
        segundos + " segundos<br>" +
        milissegundos + " ms";

}

setInterval(atualizar, 50);

atualizar();

</script>

</body>
</html>

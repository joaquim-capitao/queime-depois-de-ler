<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/style-light.css">
</head>
<body>

    <main class="container">
        <article>
            {{ content }}
        </article>
        
        <!-- Rodapé Centralizado com Ícone e Texto -->
        <footer style="text-align: center; margin-top: 60px; padding: 30px 0; clear: both;">
            <a href="{{ '/index' | relative_url }}" style="text-decoration: none; color: inherit; display: inline-flex; flex-direction: column; align-items: center; gap: 8px; opacity: 0.8; transition: opacity 0.2s;" title="Voltar ao índice">
                <span style="font-size: 36px; line-height: 1;">🏠</span>
                <span style="font-size: 14px; font-family: sans-serif; letter-spacing: 1px; text-transform: uppercase;">Índice</span>
            </a>
        </footer>
    </main>

</body>
</html>
